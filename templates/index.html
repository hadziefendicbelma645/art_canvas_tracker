<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Task Manager — Projekt 3</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 40px; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 10px 0; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: #dc3545; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Moj Task Manager</h2>
        
        <form action="/add" method="POST">
            <input type="text" name="title" placeholder="Unesi novi zadatak..." required>
            <button type="submit">Dodaj</button>
        </form>

        <ul>
            {% for task in tasks %}
            <li>
                <span>{{ task[1] }}</span>
                <a href="/delete/{{ task[0] }}" class="delete-btn">❌</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
