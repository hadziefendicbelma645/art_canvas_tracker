<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Art Canvas Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; margin: 40px; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); margin: 0 auto; }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        button { padding: 12px 20px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #4f46e5; }
        ul { list-style: none; padding: 0; }
        li { background: #f1f5f9; margin: 12px 0; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #6366f1; }
        .art-info { display: flex; flex-direction: column; }
        .art-title { font-weight: bold; color: #1e293b; }
        .art-technique { font-size: 12px; color: #64748b; margin-top: 4px; font-style: italic; }
        .delete-btn { color: #ef4444; text-decoration: none; font-size: 18px; transition: transform 0.1s; }
        .delete-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎨 Art Canvas Tracker</h2>
        
        <form action="/add" method="POST" class="form-group">
            <input type="text" name="title" placeholder="Naziv slike (npr. Planinski vrh)..." required>
            <input type="text" name="technique" placeholder="Tehnika (npr. Wet-on-wet)..." required>
            <button type="submit">Dodaj</button>
        </form>

        <ul>
            {% for art in artworks %}
            <li>
                <div class="art-info">
                    <span class="art-title">{{ art[1] }}</span>
                    <span class="art-technique">{{ art[2] }}</span>
                </div>
                <a href="/delete/{{ art[0] }}" class="delete-btn"></a>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
